<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Zen+Dots&display=swap" rel="stylesheet">

        <link rel="stylesheet" href="style/startPage.css"></link>
        <link rel="stylesheet" href="style/starBackground.css"></link>
        <link rel="stylesheet" href="style/starButton.css"></link>

        <title>Inscription</title>
    </head>
    <body>
        <div id='stars1'></div>
        <div id='stars2'></div>
        <div id='stars3'></div>
        <div id='stars4'></div>
        <div id='stars5'></div>

        <!-- Boite de dialog qui représente le formulaire d'inscription -->
        <dialog id="inscriptionPage">
            <button class="exitButton" id="inscriptionExit" onclick="hideInscription()"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#FFFFFF"><path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z"/></svg></button>
            <h2 class="title">Créer votre compte</h2>
            <form id="form-inscription" onsubmit="registerIn(event)">
                <div id="imgInfoChamps">
                    <div id="infoChamps">
                        <div class="champ">
                            <label for="nom">Nom</label>
                            <input id="nom" type="text" placeholder="Ex : Dupont">
                            <div class="error"></div>
                        </div>
                        <div class="champ">
                            <label for="prenom">Prénom</label>
                            <input id="prenom" type="text" placeholder="Ex : Lina">
                            <div class="error"></div>
                        </div>
                    </div>
                    <div class="imgChamp">
                        <label for="pp"><img width="120px" height="120px" id="photo" src="image/astro.jpg" ondrag="" ondrop="changeImg(document.getElementById('pp'))"/></label>
                        <input id="pp" type="file" accept="image/jpg, image/png, image/jpeg" onchange="changeImg(this)" value="image/astro.jpg">
                    </div>
                </div>

                <div class="champ">
                    <label for="mailInscription">Email</label>
                    <input id="mailInscription" type="text" placeholder="Ex : Lina.Dupont@example.com">
                    <div class="error"></div>
                </div>
                <div class="champ">
                    <label for="passwordInscription">Mot de Passe</label>
                    <div class="passwordChamp">
                        <input id="passwordInscription" type="password">
                        <div id="visibilityCheckedInscription"><svg xmlns='http://www.w3.org/2000/svg' height='34px' viewBox='0 -960 960 960' width='34px' fill='#000000'><path d='m644-428-58-58q9-47-27-88t-93-32l-58-58q17-8 34.5-12t37.5-4q75 0 127.5 52.5T660-500q0 20-4 37.5T644-428Zm128 126-58-56q38-29 67.5-63.5T832-500q-50-101-143.5-160.5T480-720q-29 0-57 4t-55 12l-62-62q41-17 84-25.5t90-8.5q151 0 269 83.5T920-500q-23 59-60.5 109.5T772-302Zm20 246L624-222q-35 11-70.5 16.5T480-200q-151 0-269-83.5T40-500q21-53 53-98.5t73-81.5L56-792l56-56 736 736-56 56ZM222-624q-29 26-53 57t-41 67q50 101 143.5 160.5T480-280q20 0 39-2.5t39-5.5l-36-38q-11 3-21 4.5t-21 1.5q-75 0-127.5-52.5T300-500q0-11 1.5-21t4.5-21l-84-82Zm319 93Zm-151 75Z'/></svg></div>
                    </div>
                    <div class="error"></div>
                </div>
                <div class="champ">
                    <label for="confirmation">Confirmation</label>
                    <div class="passwordChamp">
                        <input id="confirmation" type="password">
                        <div id="visibilityCheckedInscriptionConfirmation"><svg xmlns='http://www.w3.org/2000/svg' height='34px' viewBox='0 -960 960 960' width='34px' fill='#000000'><path d='m644-428-58-58q9-47-27-88t-93-32l-58-58q17-8 34.5-12t37.5-4q75 0 127.5 52.5T660-500q0 20-4 37.5T644-428Zm128 126-58-56q38-29 67.5-63.5T832-500q-50-101-143.5-160.5T480-720q-29 0-57 4t-55 12l-62-62q41-17 84-25.5t90-8.5q151 0 269 83.5T920-500q-23 59-60.5 109.5T772-302Zm20 246L624-222q-35 11-70.5 16.5T480-200q-151 0-269-83.5T40-500q21-53 53-98.5t73-81.5L56-792l56-56 736 736-56 56ZM222-624q-29 26-53 57t-41 67q50 101 143.5 160.5T480-280q20 0 39-2.5t39-5.5l-36-38q-11 3-21 4.5t-21 1.5q-75 0-127.5-52.5T300-500q0-11 1.5-21t4.5-21l-84-82Zm319 93Zm-151 75Z'/></svg></div>

                    </div>
                    <div class="error"></div>
                </div>
                <div class="galaxy-button">
                    <button class="space-button" type="submit">
                        <span class="backdrop"></span>
                        <span class="galaxy"></span>
                        <label class="text">Créer le compte</label>
                    </button>
                    <div class="bodydrop"></div>
                </div>
            </form>
        </dialog>

        <!-- Boite de dialog qui représente le formulaire de connexion -->
        <dialog id="connexionPage">
            <button class="exitButton" id="connexionExit" onclick="hideConnexion()"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#FFFFFF"><path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z"/></svg></button>
            <h2 class="title">Connectez-vous</h2>
            <form id="form-connexion" onsubmit="signIn(event)">
                <div class="champ">
                    <label for="mailConnexion">Email</label>
                    <input id="mailConnexion" type="text" placeholder="Ex : Lina.Dupont@example.com">
                    <div class="error"></div>
                </div>
                <div class="champ">
                    <label for="passwordConnexion">Mot de Passe</label>
                    <div class="passwordChamp">
                        <input id="passwordConnexion" type="password">
                        <div id="visibilityCheckedConnexion"><svg xmlns='http://www.w3.org/2000/svg' height='34px' viewBox='0 -960 960 960' width='34px' fill='#000000'><path d='m644-428-58-58q9-47-27-88t-93-32l-58-58q17-8 34.5-12t37.5-4q75 0 127.5 52.5T660-500q0 20-4 37.5T644-428Zm128 126-58-56q38-29 67.5-63.5T832-500q-50-101-143.5-160.5T480-720q-29 0-57 4t-55 12l-62-62q41-17 84-25.5t90-8.5q151 0 269 83.5T920-500q-23 59-60.5 109.5T772-302Zm20 246L624-222q-35 11-70.5 16.5T480-200q-151 0-269-83.5T40-500q21-53 53-98.5t73-81.5L56-792l56-56 736 736-56 56ZM222-624q-29 26-53 57t-41 67q50 101 143.5 160.5T480-280q20 0 39-2.5t39-5.5l-36-38q-11 3-21 4.5t-21 1.5q-75 0-127.5-52.5T300-500q0-11 1.5-21t4.5-21l-84-82Zm319 93Zm-151 75Z'/></svg></div>
                    </div>
                    <div class="error"></div>
                </div>
                <div class="galaxy-button">
                    <button class="space-button" type="submit">
                        <span class="backdrop"></span>
                        <span class="galaxy"></span>
                        <label class="text">Connexion</label>
                    </button>
                    <div class="bodydrop"></div>
                </div>
            </form>
            <div id="erreurConnexion"></div>
        </dialog>
        
        <!-- Corps principale de la page -->
        <div id="acceuil">
            <div class="titleDiv">
                <h1 class="title">MySpace</h1>
                <h3>Let explore the universe together !</h3>
            </div>
            <div class="buttonDiv">
                <h2>Inscrivez-vous</h2>
                <div class="galaxy-button">
                    <button class="space-button" id="inscriptionButton" onclick="showInscription()">
                        <span class="backdrop"></span>
                        <span class="galaxy"></span>
                        <label class="text">Créer un compte</label>
                    </button>
                    <div class="bodydrop"></div>
                </div>

                <h2>Connectez-vous</h2>
                <div class="galaxy-button">
                    <button class="space-button" id="connexionButton" onclick="showConnexion()">
                        <span class="backdrop"></span>
                        <span class="galaxy"></span>
                        <label class="text">Se connecter</label>
                    </button>
                    <div class="bodydrop"></div>
                </div>
            </div>
        </div>

        <script src="scripts/scripts.js"></script>
        <script src="scripts/startPage.js"></script>
    </body>
</html>
